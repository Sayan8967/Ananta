services:
  postgres:
    image: postgres:16-alpine
    container_name: ananta-postgres
    environment:
      POSTGRES_DB: ananta
      POSTGRES_USER: ananta
      POSTGRES_PASSWORD: ananta_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/postgres/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ananta"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    container_name: ananta-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ananta
      MONGO_INITDB_ROOT_PASSWORD: ananta_dev_password
      MONGO_INITDB_DATABASE: ananta
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./db/mongodb/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ananta-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: ananta-keycloak
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/ananta
      KC_DB_USERNAME: ananta
      KC_DB_PASSWORD: ananta_dev_password
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8080:8080"
    volumes:
      - ./app/services/auth-service/keycloak:/opt/keycloak/data/import
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  mongodb_data:
  redis_data:
