apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: ananta-prod-ap-south-1
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: https://github.com/ananta-health/Ananta.git
        revision: main
        directories:
          - path: helm/apps/*
  template:
    metadata:
      name: "{{ `{{.path.basename}}` }}-prod-ap-south-1"
      labels:
        environment: prod
        region: ap-south-1
        platform: ananta
    spec:
      project: ananta
      source:
        repoURL: https://github.com/ananta-health/Ananta.git
        targetRevision: main
        path: "{{ `{{.path.path}}` }}"
        helm:
          valueFiles:
            - values.yaml
            - values-prod-ap-south-1.yaml
      destination:
        server: https://kubernetes.default.svc
        namespace: ananta-prod
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ApplyOutOfSyncOnly=true
        retry:
          limit: 3
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
