replicaCount: 2

image:
  repository: ""
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 3004

env: {}

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

serviceAccount:
  create: true
  annotations: {}
  name: ""

networkPolicy:
  enabled: true

livenessProbe:
  httpGet:
    path: /health/live
    port: 3004
  initialDelaySeconds: 30
  periodSeconds: 10

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []

readinessProbe:
  httpGet:
    path: /health/ready
    port: 3004
  initialDelaySeconds: 5
  periodSeconds: 5
