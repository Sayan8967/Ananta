replicaCount: 1

image:
  repository: "ananta-dev-ap-south-1.dkr.ecr.ap-south-1.amazonaws.com/keycloak"

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: false

env:
  KC_DB: "postgres"
  KC_DB_URL: "jdbc:postgresql://keycloak-db-dev.ap-south-1.rds.amazonaws.com:5432/keycloak"
  KC_DB_USERNAME: "keycloak"
  KC_HOSTNAME: "auth-dev.ananta.health"
  KC_PROXY: "edge"
  KC_LOG_LEVEL: "DEBUG"
