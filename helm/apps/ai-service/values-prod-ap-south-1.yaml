replicaCount: 3

image:
  repository: "ananta-prod-ap-south-1.dkr.ecr.ap-south-1.amazonaws.com/ai-service"

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 15
  targetCPUUtilizationPercentage: 70

env:
  NODE_ENV: "production"
  DATABASE_URL: "postgresql://ananta:ananta-prod@ai-db-prod.ap-south-1.rds.amazonaws.com:5432/ai_service"
  REDIS_URL: "redis://redis-prod.ap-south-1.cache.amazonaws.com:6379"
  LOG_LEVEL: "info"
  AUTH_SERVICE_URL: "http://auth-service.ananta-prod.svc.cluster.local:3004"
  MODEL_ENDPOINT: "http://ml-models-prod.ap-south-1.sagemaker.amazonaws.com"
