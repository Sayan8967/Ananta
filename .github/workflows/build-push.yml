name: "Build & Push Docker Images"

on:
  push:
    branches:
      - main
    paths:
      - "services/**"
      - "apps/**"
  workflow_dispatch:
    inputs:
      service:
        description: "Service to build (e.g., api-gateway, auth-service)"
        required: true
        type: string
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - prod

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: "ap-south-1"

jobs:
  detect-services:
    name: "Detect Changed Services"
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.changes.outputs.services }}
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed services
        id: changes
        run: |
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)

          declare -A SERVICE_MAP
          SERVICES="[]"

          while IFS= read -r file; do
            # Match services/<service-name>/...
            if [[ "$file" =~ ^services/([^/]+)/ ]]; then
              SERVICE_MAP["${BASH_REMATCH[1]}"]=1
            fi
            # Match apps/<app-name>/...
            if [[ "$file" =~ ^apps/([^/]+)/ ]]; then
              SERVICE_MAP["${BASH_REMATCH[1]}"]=1
            fi
          done <<< "$CHANGED_FILES"

          SERVICES=$(printf '%s\n' "${!SERVICE_MAP[@]}" | jq -R -s -c 'split("\n") | map(select(. != ""))')
          echo "services=${SERVICES}" >> "$GITHUB_OUTPUT"
          echo "Changed services: ${SERVICES}"

  build-push:
    name: "Build: ${{ matrix.service }}"
    runs-on: ubuntu-latest
    needs: detect-services
    if: |
      (github.event_name == 'push' && needs.detect-services.outputs.services != '[]') ||
      github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        service: ${{ github.event_name == 'workflow_dispatch' && fromJson(format('["{0}"]', inputs.service)) || fromJson(needs.detect-services.outputs.services) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set environment
        id: env
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "env_name=${{ inputs.environment }}" >> "$GITHUB_OUTPUT"
          else
            echo "env_name=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image metadata
        id: meta
        run: |
          ECR_REGISTRY="${{ steps.ecr-login.outputs.registry }}"
          ENV_NAME="${{ steps.env.outputs.env_name }}"
          SERVICE="${{ matrix.service }}"
          IMAGE_REPO="${ECR_REGISTRY}/${ENV_NAME}/${SERVICE}"
          SHORT_SHA="${GITHUB_SHA::8}"
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          IMAGE_TAG="v${TIMESTAMP}-${SHORT_SHA}"

          echo "registry=${ECR_REGISTRY}" >> "$GITHUB_OUTPUT"
          echo "image_repo=${IMAGE_REPO}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "full_image=${IMAGE_REPO}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Determine Dockerfile path
        id: dockerfile
        run: |
          SERVICE="${{ matrix.service }}"

          # Check in services/ first, then apps/
          if [[ -f "services/${SERVICE}/Dockerfile" ]]; then
            echo "path=services/${SERVICE}/Dockerfile" >> "$GITHUB_OUTPUT"
            echo "context=services/${SERVICE}" >> "$GITHUB_OUTPUT"
          elif [[ -f "apps/${SERVICE}/Dockerfile" ]]; then
            echo "path=apps/${SERVICE}/Dockerfile" >> "$GITHUB_OUTPUT"
            echo "context=apps/${SERVICE}" >> "$GITHUB_OUTPUT"
          else
            echo "::error::No Dockerfile found for service '${SERVICE}'"
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ steps.dockerfile.outputs.context }}
          file: ${{ steps.dockerfile.outputs.path }}
          push: true
          tags: |
            ${{ steps.meta.outputs.full_image }}
            ${{ steps.meta.outputs.image_repo }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_ENV=${{ steps.env.outputs.env_name }}
            COMMIT_SHA=${{ github.sha }}

      - name: Output image details
        run: |
          echo "### Docker Image Built" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Service | \`${{ matrix.service }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | \`${{ steps.meta.outputs.full_image }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Environment | \`${{ steps.env.outputs.env_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
