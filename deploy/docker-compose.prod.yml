## Ananta - Single-Server Production Deployment
## Runs everything on one EC2 instance (~$15-25/month on t3.medium)
##
## Usage:
##   docker compose -f deploy/docker-compose.prod.yml up -d --build
##
## Prerequisites:
##   - Docker & Docker Compose installed
##   - .env file created from .env.example

services:
  # ─── Infrastructure ────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ananta-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ananta}
      POSTGRES_USER: ${POSTGRES_USER:-ananta}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/postgres/migrations:/docker-entrypoint-initdb.d/01-schema
      - ./db/postgres/seed:/docker-entrypoint-initdb.d/02-seed
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ananta}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ananta-internal

  mongodb:
    image: mongo:7
    container_name: ananta-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-ananta}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:?Set MONGO_PASSWORD in .env}
      MONGO_INITDB_DATABASE: ananta
    volumes:
      - mongodb_data:/data/db
      - ./db/mongodb/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ananta-internal

  redis:
    image: redis:7-alpine
    container_name: ananta-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ananta-internal

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: ananta-keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?Set KEYCLOAK_ADMIN_PASSWORD in .env}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-ananta}
      KC_DB_USERNAME: ${POSTGRES_USER:-ananta}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_HOSTNAME: ${DOMAIN:-localhost}
      KC_HOSTNAME_PATH: /auth
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ./app/services/auth-service/keycloak:/opt/keycloak/data/import
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ananta-internal

  # ─── Application Services ──────────────────────────────────
  patient-service:
    build:
      context: .
      dockerfile: app/services/patient-service/Dockerfile
    container_name: ananta-patient-service
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3001"
      DATABASE_URL: postgresql://${POSTGRES_USER:-ananta}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ananta}
      MONGODB_URI: mongodb://${MONGO_USER:-ananta}:${MONGO_PASSWORD}@mongodb:27017/ananta?authSource=admin
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: ananta
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ananta-internal

  doctor-service:
    build:
      context: .
      dockerfile: app/services/doctor-service/Dockerfile
    container_name: ananta-doctor-service
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3002"
      DATABASE_URL: postgresql://${POSTGRES_USER:-ananta}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ananta}
      MONGODB_URI: mongodb://${MONGO_USER:-ananta}:${MONGO_PASSWORD}@mongodb:27017/ananta?authSource=admin
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: ananta
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ananta-internal

  emergency-service:
    build:
      context: .
      dockerfile: app/services/emergency-service/Dockerfile
    container_name: ananta-emergency-service
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3003"
      DATABASE_URL: postgresql://${POSTGRES_USER:-ananta}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ananta}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ananta-internal

  auth-service:
    build:
      context: .
      dockerfile: app/services/auth-service/Dockerfile
    container_name: ananta-auth-service
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3004"
      DATABASE_URL: postgresql://${POSTGRES_USER:-ananta}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ananta}
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: ananta
      KEYCLOAK_CLIENT_ID: ananta-backend
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-change-me}
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
    networks:
      - ananta-internal

  ai-service:
    build:
      context: app/services/ai-service
      dockerfile: Dockerfile
    container_name: ananta-ai-service
    restart: unless-stopped
    environment:
      PORT: "3005"
      LOG_LEVEL: info
    networks:
      - ananta-internal

  web:
    build:
      context: .
      dockerfile: app/web/Dockerfile
    container_name: ananta-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: https://${DOMAIN:-localhost}
      NEXT_PUBLIC_KEYCLOAK_URL: https://${DOMAIN:-localhost}/auth
      NEXT_PUBLIC_KEYCLOAK_REALM: ananta
      NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: ananta-web
    depends_on:
      - patient-service
      - doctor-service
      - emergency-service
      - auth-service
    networks:
      - ananta-internal

  # ─── Reverse Proxy ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: ananta-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/certs:/etc/nginx/certs:ro
      - certbot_webroot:/var/www/certbot:ro
    depends_on:
      - web
      - keycloak
    networks:
      - ananta-internal

  # ─── SSL (Let's Encrypt) ───────────────────────────────────
  certbot:
    image: certbot/certbot
    container_name: ananta-certbot
    volumes:
      - ./deploy/nginx/certs:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do sleep 12h & wait $${!}; certbot renew; done'"

volumes:
  postgres_data:
  mongodb_data:
  redis_data:
  certbot_webroot:

networks:
  ananta-internal:
    driver: bridge
