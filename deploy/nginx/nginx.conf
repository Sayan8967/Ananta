events {
    worker_connections 1024;
}

http {
    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=emergency:10m rate=10r/s;

    # Gzip
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Upstream services
    upstream web       { server web:3000; }
    upstream patient   { server patient-service:3001; }
    upstream doctor    { server doctor-service:3002; }
    upstream emergency { server emergency-service:3003; }
    upstream auth      { server auth-service:3004; }
    upstream ai        { server ai-service:3005; }
    upstream keycloak  { server keycloak:8080; }

    # HTTP → HTTPS redirect (uncomment when SSL is ready)
    # server {
    #     listen 80;
    #     server_name _;
    #     location /.well-known/acme-challenge/ { root /var/www/certbot; }
    #     location / { return 301 https://$host$request_uri; }
    # }

    server {
        listen 80;
        # listen 443 ssl;  # Uncomment when SSL certs are ready
        server_name _;

        # SSL certs (uncomment when ready)
        # ssl_certificate /etc/nginx/certs/live/YOUR_DOMAIN/fullchain.pem;
        # ssl_certificate_key /etc/nginx/certs/live/YOUR_DOMAIN/privkey.pem;

        # Let's Encrypt challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # ─── Keycloak ────────────────────────────────────
        location /auth/ {
            proxy_pass http://keycloak/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
        }

        # ─── API Routes ──────────────────────────────────
        location /api/v1/patient/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://patient/api/v1/patient/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/v1/doctor/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://doctor/api/v1/doctor/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/v1/emergency/ {
            limit_req zone=emergency burst=5 nodelay;
            proxy_pass http://emergency/api/v1/emergency/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/v1/auth/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://auth/api/v1/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/v1/ai/ {
            limit_req zone=api burst=10 nodelay;
            client_max_body_size 10M;
            proxy_pass http://ai/api/v1/ai/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ─── Health Checks ────────────────────────────────
        location /health/ {
            proxy_pass http://patient/health/;
        }

        # ─── Web Frontend (catch-all) ─────────────────────
        location / {
            proxy_pass http://web;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
